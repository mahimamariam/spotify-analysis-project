<!DOCTYPE html>
<html>
<head>
    <title>Spotify Top Songs Analysis</title>
    <style>
       body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: radial-gradient(circle at top left, #0f2027, #000000);
    color: white;
    display: flex;
}

/* Sidebar */
.sidebar {
    width: 240px;
    height: 100vh;
    background: rgba(0,0,0,0.9);
    padding: 30px 20px;
    border-right: 1px solid rgba(29,185,84,0.3);
    box-shadow: 0 0 20px rgba(29,185,84,0.2);
    animation: glowSidebar 2s infinite alternate;
}

.sidebar h2 {
    color: #1DB954;
    margin-bottom: 40px;
    text-shadow: 0 0 10px #1DB954;
}

.sidebar button {
    width: 100%;
    background: transparent;
    border: none;
    color: #bbb;
    padding: 12px;
    margin-bottom: 10px;
    text-align: left;
    border-radius: 10px;
    cursor: pointer;
    transition: 0.3s;
}

.sidebar button:hover {
    background: rgba(29,185,84,0.2);
    color: #1DB954;
    transform: translateX(5px);
}
/* Main content */
.main {
    flex: 1;
    padding: 40px;
    max-width: 1200px;
    margin: auto;
}
table {
    width: 100%;
    border-collapse: collapse;
    margin-top: 20px;
    background: rgba(255,255,255,0.05);
    backdrop-filter: blur(10px);
    border-radius: 20px;
    overflow: hidden;
    box-shadow: 0 0 20px rgba(29,185,84,0.2);
}

/* Header */
th {
    background: linear-gradient(90deg, #1DB954, #1ed760);
    color: black;
    padding: 15px;
    text-transform: uppercase;
    letter-spacing: 1px;
}

/* Data cells */
td {
    padding: 14px;
    color: #eee;
    border-bottom: 1px solid rgba(255,255,255,0.05);
}

/* Row hover animation */
tr {
    transition: 0.3s;
}

tr:hover {
    background: rgba(29,185,84,0.15);
    transform: scale(1.01);
}

/* Zebra effect */
tr:nth-child(even) {
    background: rgba(255,255,255,0.02);
}
.card-container {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
    gap: 25px;
    margin-top: 20px;
}

.card {
    background: linear-gradient(135deg, #1DB954, #1ed760);
    padding: 25px;
    border-radius: 20px;
    text-align: center;
    color: black;
    font-weight: bold;
    box-shadow: 0 10px 30px rgba(29,185,84,0.3);
    transition: all 0.4s ease;
    position: relative;
    overflow: hidden;

    animation: cardFade 0.6s ease;
}
.card:hover {
    transform: translateY(-10px) scale(1.05);
    box-shadow: 0 20px 50px rgba(29,185,84,0.6);
}
.card::before {
    content: "";
    position: absolute;
    width: 200%;
    height: 200%;
    background: radial-gradient(circle, rgba(255,255,255,0.2), transparent);
    top: -50%;
    left: -50%;
    transform: rotate(25deg);
}

.card h3 {
    margin-bottom: 10px;
}
canvas {
    background: #121212;
    padding: 20px;
    border-radius: 15px;
    margin-top: 30px;
}
table {
    animation: fadeIn 0.5s ease-in-out;
}
@keyframes cardFade {
    from {
        opacity: 0;
        transform: translateY(20px);
    }
    to {
        opacity: 1;
        transform: translateY(0);
    }
}

@keyframes fadeIn {
    from {opacity: 0; transform: translateY(10px);}
    to {opacity: 1; transform: translateY(0);}
}
#pageTitle {
    font-size: 28px;
    text-shadow: 0 0 10px rgba(29,185,84,0.5);
}
/* Scrollbar */
::-webkit-scrollbar {
    width: 8px;
}

::-webkit-scrollbar-track {
    background: #111;
}

::-webkit-scrollbar-thumb {
    background: #1DB954;
    border-radius: 10px;
}
.progress-bar {
    width: 100%;
    height: 8px;
    background: #222;
    border-radius: 10px;
    overflow: hidden;
    margin-bottom: 5px;
}

.progress {
    height: 100%;
    background: linear-gradient(90deg, #1DB954, #1ed760);
    transition: width 0.5s ease-in-out;
}
@keyframes glowSidebar {
    from {
        box-shadow: 0 0 10px rgba(29,185,84,0.2);
    }
    to {
        box-shadow: 0 0 25px rgba(29,185,84,0.6);
    }
}
.sidebar button.active {
    background: rgba(29,185,84,0.3);
    color: #1DB954;
}
.top-songs {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
    gap: 15px;
    margin-top: 20px;
}

.song-card {
    animation: floatCard 3s ease-in-out infinite;
}

@keyframes floatCard {
    0% { transform: translateY(0px); }
    50% { transform: translateY(-6px); }
    100% { transform: translateY(0px); }
}

.song-card:hover {
    background: rgba(29,185,84,0.25);
    transform: scale(1.07);
}
tr.selected {
    background: rgba(29,185,84,0.35) !important;
    transform: scale(1.02);
}
.section {
    margin-top: 40px;
}
h2 {
    margin-bottom: 15px;
    color: #1DB954;
    text-shadow: 0 0 10px rgba(29,185,84,0.5);
}
button {
    position: relative;
    overflow: hidden;
}

button::after {
    content: "";
    position: absolute;
    width: 0;
    height: 0;
    background: rgba(255,255,255,0.3);
    border-radius: 50%;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    transition: 0.5s;
}

button:active::after {
    width: 200px;
    height: 200px;
}
.card:hover {
    animation: pulse 0.6s ease;
}

@keyframes pulse {
    0% { transform: scale(1); }
    50% { transform: scale(1.08); }
    100% { transform: scale(1.05); }
}
#content {
    animation: fadePage 0.5s ease;
}

@keyframes fadePage {
    from {
        opacity: 0;
        transform: translateY(15px);
    }
    to {
        opacity: 1;
        transform: translateY(0);
    }
}
#themeBtn {
    padding: 10px 15px;
    margin-bottom: 15px;
    border-radius: 10px;
    border: none;
    background: #1DB954;
    color: black;
    cursor: pointer;
    font-weight: bold;
}
.light-mode {
    background: #f5f5f5;
    color: black;
}

.light-mode .card {
    background: #ffffff;
    color: black;
}

.light-mode .sidebar {
    background: #ffffff;
    color: black;
}

.light-mode table {
    background: #ffffff;
}

.light-mode .song-card {
    background: #ffffff;
    color: black;
}
.form-card {
    max-width: 400px;
    margin: 20px auto;
    padding: 25px;
    border-radius: 20px;
    background: rgba(255,255,255,0.05);
    backdrop-filter: blur(12px);
    box-shadow: 0 0 25px rgba(29,185,84,0.2);
    display: flex;
    flex-direction: column;
    gap: 15px;
    animation: fadeIn 0.5s ease;
}

.form-card h2 {
    text-align: center;
    color: #1DB954;
}

.form-card input {
    padding: 12px;
    border-radius: 10px;
    border: none;
    outline: none;
    background: #111;
    color: white;
}

.form-card input:focus {
    box-shadow: 0 0 10px #1DB954;
}

.form-card button {
    padding: 12px;
    border-radius: 10px;
    border: none;
    background: linear-gradient(90deg, #1DB954, #1ed760);
    color: black;
    font-weight: bold;
    cursor: pointer;
    transition: 0.3s;
}

.form-card button:hover {
    transform: scale(1.05);
}
/* 🔥 Modal Background */
.modal {
    display: none;
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.7);
    justify-content: center;
    align-items: center;
    z-index: 999; /* VERY IMPORTANT */
}

/* 🔥 Modal Box */
.modal-content {
    background: #111;
    padding: 30px;
    border-radius: 15px;
    text-align: center;
    box-shadow: 0 0 20px #1DB954;
    width: 300px;
}

/* 🔥 Input styling */
.modal-content input {
    width: 90%;
    padding: 10px;
    border-radius: 8px;
    border: none;
    outline: none;
}

/* 🔥 Buttons inside modal */
.modal-content button {
    margin: 5px;
    padding: 10px 15px;
    border-radius: 8px;
    border: none;
    cursor: pointer;
    background: #1DB954;
    color: black;
    font-weight: bold;
}
    </style>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
<div class="sidebar">
    <h2>Spotify DB</h2>

    <button onclick="setActive(this); showDashboard()">📊 Dashboard</button>
<button onclick="setActive(this); loadArtists()">👩‍🎤 Artist Table</button>
<button onclick="setActive(this); loadAlbums()">💿 Album Table</button>
<button onclick="setActive(this); loadSongs()">🎵 Song Table</button>
<button onclick="setActive(this); loadStreaming()">📈 Streaming Stats</button>
</div>

<div class="main">
    <h1 id="pageTitle">Dashboard</h1>

    <!-- ✅ ADD HERE -->
    <button onclick="toggleTheme()" id="themeBtn">🌙 Dark Mode</button>
    <button onclick="showAddForm()">➕ Add Song</button>
<button onclick="loadSongs()">🔄 Refresh Songs</button>

<div id="formArea"></div>

    <input type="text" id="searchBox" placeholder="🔍 Search song..." onkeyup="searchSong()" style="padding:10px; width:250px; margin-bottom:20px; border-radius:8px; border:none;">

    <div id="content"></div>
</div>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script>
    let allSongs = [];
    let currentEditId = null;
function showDashboard() {
    document.getElementById("pageTitle").innerText = "Dashboard";

    fetch("/dashboard")
    .then(res => res.json())
    .then(data => {

        document.getElementById("content").innerHTML = `

    <div class="section">
        <div class="card-container">

            <div class="card">
                <h3>Total Artists</h3>
                <p>${data.total_artists}</p>
            </div>

            <div class="card">
                <h3>Total Albums</h3>
                <p>${data.total_albums}</p>
            </div>

            <div class="card">
                <h3>Total Songs</h3>
                <p>${data.total_songs}</p>
            </div>

            <div class="card">
                <h3>Streaming Records</h3>
                <p>${data.total_streaming_records}</p>
            </div>

        </div>
    </div>

    <div class="section">
        <h2>🔥 Top 5 Songs</h2>
        <div id="topSongs"></div>
    </div>

    <div class="section">
        <h2>📊 Popularity Chart</h2>
        <canvas id="songChart"></canvas>
    </div>

`;
        loadTopSongs();   // ✅ now works
        loadChart();      // ✅ chart works
    });
}
function loadTopSongs() {
    fetch("/top-songs")
    .then(res => res.json())
    .then(data => {

        let topHTML = "<div class='top-songs'>";

        data.forEach((song, index) => {
            let medal = "";
            if(index === 0) medal = "🥇";
            else if(index === 1) medal = "🥈";
            else if(index === 2) medal = "🥉";

            topHTML += `
                <div class="song-card">
                    <h4>${medal} ${song.title}</h4>
                    <p>⭐ Popularity: ${song.popularity_score}</p>
                </div>
            `;
        });

        topHTML += "</div>";

        document.getElementById("topSongs").innerHTML = topHTML;
    });
}

function loadArtists() {
    document.getElementById("pageTitle").innerText = "Artist Table";

    fetch("/artists")
    .then(res => res.json())
    .then(data => displayTable(data));
}

function loadAlbums() {
    document.getElementById("pageTitle").innerText = "Album Table";

    fetch("/albums")
    .then(res => res.json())
    .then(data => displayTable(data));
}

function loadSongs() {
    document.getElementById("pageTitle").innerText = "Song Details";

    fetch("/song-details")
    .then(res => res.json())
    .then(data => {
        allSongs = data; // store all data
        displayTable(data);
    });
}
function searchSong() {
    const value = document.getElementById("searchBox").value.toLowerCase();

    const filtered = allSongs.filter(song =>
        song.title.toLowerCase().includes(value)
    );

    displayTable(filtered);
}
function loadStreaming() {
    document.getElementById("pageTitle").innerText = "Streaming Stats";

    fetch("/streaming")
    .then(res => res.json())
    .then(data => displayTable(data));
}
function loadChart() {
    fetch("/top-songs")
    .then(res => res.json())
    .then(data => {

        const ctx = document.getElementById("songChart").getContext("2d");

        // 🎨 Gradient effect
        const gradient = ctx.createLinearGradient(0, 0, 0, 400);
        gradient.addColorStop(0, "#1DB954");
        gradient.addColorStop(1, "#0f2027");
        if(window.myChart) {
    window.myChart.destroy();
}

        window.myChart = new Chart(ctx, {
            type: 'bar',
            data: {
                labels: data.map(song => song.title),
                datasets: [{
                    label: 'Popularity Score',
                    data: data.map(song => song.popularity_score),
                    backgroundColor: gradient,
                    borderRadius: 12,
                    borderSkipped: false
                }]
            },
            options: {
                responsive: true,
                animation: {
                    duration: 1200,
                    easing: 'easeOutQuart'
                },
                plugins: {
                    legend: {
                        labels: {
                            color: 'white'
                        }
                    }
                },
                scales: {
                    x: {
                        ticks: {
                            color: 'white'
                        },
                        grid: {
                            color: "rgba(255,255,255,0.05)"
                        }
                    },
                    y: {
                        ticks: {
                            color: 'white'
                        },
                        grid: {
                            color: "rgba(255,255,255,0.05)"
                        }
                    }
                }
            }
        });

    });
}
function setActive(button) {
    document.querySelectorAll('.sidebar button')
        .forEach(btn => btn.classList.remove('active'));

    button.classList.add('active');
}
function highlightRow(row) {
    document.querySelectorAll("tr").forEach(r => r.classList.remove("selected"));
    row.classList.add("selected");
}
function toggleTheme() {
    document.body.classList.toggle("light-mode");

    const btn = document.getElementById("themeBtn");

    if(document.body.classList.contains("light-mode")) {
        btn.innerText = "🌞 Light Mode";
    } else {
        btn.innerText = "🌙 Dark Mode";
    }
}
function showAddForm() {
    document.getElementById("formArea").innerHTML = `
        <div class="form-card">
            <h2>➕ Add New Song</h2>

            <input id="title" placeholder="🎵 Song Title">
            <input id="duration" placeholder="⏱ Duration">
            <input id="genre" placeholder="🎼 Genre">
            <input id="album_id" placeholder="💿 Album ID">

            <button onclick="addSong()">🚀 Add Song</button>
        </div>
    `;
}
function addSong() {
    const data = {
        title: document.getElementById("title").value,
        duration: document.getElementById("duration").value,
        genre: document.getElementById("genre").value,
        album_id: document.getElementById("album_id").value
    };

    fetch("/add-song", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify(data)
    })
    .then(res => res.text())
    .then(() => {
        alert("Song Added!");
        loadSongs();
    });
}
function deleteSong(id) {
    if(confirm("Delete this song?")) {
        fetch(`/delete-song/${id}`, {
            method: "DELETE"
        })
        .then(res => res.text())
        .then(() => {
            alert("Deleted!");
            loadSongs();
        });
    }
}
function editSong(id, title) {
    currentEditId = id;   // ✅ store id

    // ✅ fill input with current title
    document.getElementById("editTitle").value = title;

    // ✅ open modal
    document.getElementById("editModal").style.display = "flex";
}
function updateSong() {
    const newTitle = document.getElementById("editTitle").value;

    fetch(`/update-song/${currentEditId}`, {
        method: "PUT",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({ title: newTitle })
    })
    .then(res => res.text())
    .then(() => {
        closeModal();   // ✅ close popup
        loadSongs();    // ✅ refresh table
    });
}
function closeModal() {
    document.getElementById("editModal").style.display = "none";
}
function displayTable(data) {
    if (data.length === 0) {
        document.getElementById("content").innerHTML = "No data found";
        return;
    }

    let table = "<table><tr>";

    // ✅ Normal columns
    Object.keys(data[0]).forEach(key => {
        table += "<th>" + key + "</th>";
    });

    // ✅ Action column (ONLY ONCE)
    table += "<th>Action</th>";
    table += "</tr>";

    // ✅ Sort by popularity (highest first)
    data.sort((a, b) => b.popularity_score - a.popularity_score);

    // ✅ Rows
    data.forEach((row, index) => {

        let rankBadge = "";
        if (index === 0) rankBadge = "🥇";
        else if (index === 1) rankBadge = "🥈";
        else if (index === 2) rankBadge = "🥉";

        table += `<tr onclick="highlightRow(this)">`;

        Object.entries(row).forEach(([key, value]) => {

            if (key === "popularity_score") {
                table += `
                <td>
                    <div class="progress-bar">
                        <div class="progress" style="width:${value}%"></div>
                    </div>
                    ${value}
                </td>
                `;
            } 
            else if (key === "title") {
                table += `<td>${rankBadge} ${value}</td>`;
            } 
            else {
                table += `<td>${value}</td>`;
            }

        });

        // ✅ Action buttons (CORRECT PLACE)
        table += `
        <td>
            <button onclick="event.stopPropagation(); editSong(${row.song_id}, '${row.title}')">✏️</button>
            <button onclick="event.stopPropagation(); deleteSong(${row.song_id})">🗑️</button>
        </td>
        `;

        table += "</tr>";
    });

    table += "</table>";

    document.getElementById("content").innerHTML = table;
}
showDashboard();

</script>
<!-- 🔥 Edit Modal -->
<div id="editModal" class="modal">
    <div class="modal-content">
        <h3>Edit Song</h3>
        <input id="editTitle" placeholder="Song Title">
        <br><br>
        <button onclick="updateSong()">Update</button>
        <button onclick="closeModal()">Cancel</button>
    </div>
</div>
</body>
</html>
